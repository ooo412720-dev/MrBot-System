version: "3.9"

services:
  bot:
    build: .
    container_name: mrbot_app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - mrbot_network

  postgres:
    image: postgres:16
    container_name: mrbot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mrbot}
      POSTGRES_USER: ${POSTGRES_USER:-mrbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-StrongPassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mrbot_network

  redis:
    image: redis:7
    container_name: mrbot_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mrbot_network

  prometheus:
    image: prom/prometheus
    container_name: mrbot_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - mrbot_network

  grafana:
    image: grafana/grafana
    container_name: mrbot_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - mrbot_network

volumes:
  postgres_data:
  redis_data:
  grafana_data:

networks:
  mrbot_network:
